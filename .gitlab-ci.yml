workflow:
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/

stages:
  - build
  - release

variables:
  CARGO_TERM_COLOR: always

build:
  stage: build
  image: ubuntu:latest
  tags:
    - linux
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
  cache:
    key: linux-release
    paths:
      - target/
      - .cargo/
  script:
    - apt-get update -yqq && apt-get install -yqq libwebkit2gtk-4.1-dev libgtk-3-dev pkg-config libssl-dev build-essential curl
    - cargo test --release
    - cargo build --release
    - |
      URL="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/ram_ui/${CI_COMMIT_TAG}/ram_ui"
      curl --fail --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file target/release/ram_ui "${URL}"

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
  needs: [build]
  script:
    - echo "Creating release $CI_COMMIT_TAG"
  release:
    tag_name: $CI_COMMIT_TAG
    name: "Release $CI_COMMIT_TAG"
    description: "See [CHANGELOG.md]($CI_PROJECT_URL/-/blob/main/CHANGELOG.md) for details."
    assets:
      links:
        - name: ram_ui
          url: "$CI_API_V4_URL/projects/$CI_PROJECT_ID/packages/generic/ram_ui/$CI_COMMIT_TAG/ram_ui"
